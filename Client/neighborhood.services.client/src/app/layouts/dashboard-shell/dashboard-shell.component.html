<div class="dashboard d-flex">

  <!-- Sidebar slot: each role projects its own <app-*-sidebar sidebar /> here -->
  <ng-content select="[sidebar]" />

  <!-- Main area -->
  <main class="flex-grow-1 d-flex flex-column" style="min-width: 0;">

    <!-- Topbar -->
    <header class="topbar bg-white border-bottom px-4 d-flex align-items-center justify-content-between">
      <h1 class="h5 fw-bold mb-0">{{ title() }}</h1>

      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light position-relative" type="button">
          <i class="bi bi-bell"></i>
          <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">3</span>
        </button>
        <div class="avatar">A</div>
      </div>
    </header>

    <!-- Page content -->
    <div class="content flex-grow-1 p-4">
      <router-outlet />
    </div>

  </main>
</div>
