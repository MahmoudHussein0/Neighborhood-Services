<div class="dashboard d-flex">

  <!-- Sidebar slot: each role projects its own <app-*-sidebar sidebar /> here -->
  <ng-content select="[sidebar]" />

  <!-- Mobile drawer backdrop (tap to close) -->
  @if (layout.mobileOpen()) {
    <div class="sidebar-backdrop d-lg-none" (click)="layout.closeMobile()"></div>
  }

  <!-- Main area -->
  <main class="flex-grow-1 d-flex flex-column" style="min-width: 0;">

    <!-- Topbar -->
    <header class="topbar bg-white border-bottom px-4 d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <button
          class="btn btn-sm btn-light d-lg-none"
          type="button"
          aria-label="Toggle menu"
          (click)="layout.toggleMobile()">
          <i class="bi bi-list fs-5"></i>
        </button>
        <h1 class="h5 fw-bold mb-0">{{ title() }}</h1>
      </div>

      <div class="d-flex align-items-center gap-3">
        <app-language-switcher />
        <app-notification-bell />
        <div class="user-summary d-none d-sm-flex flex-column align-items-end">
          <span class="fw-semibold small">{{ currentUser()?.fullName || 'Account' }}</span>
          <span class="text-muted user-role">{{ currentUser()?.role || 'User' }}</span>
        </div>
        <div class="avatar">
          @if (userPhoto()) {
            <img [src]="userPhoto()" alt="Profile photo" />
          } @else {
            {{ userInitial() }}
          }
        </div>
        <button
          class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-2"
          type="button"
          (click)="logout()"
          [disabled]="isLoggingOut()"
        >
          @if (isLoggingOut()) {
            <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
          } @else {
            <i class="bi bi-box-arrow-right"></i>
          }
          <span class="d-none d-md-inline">Logout</span>
        </button>
      </div>
    </header>

    <!-- Page content -->
    <div class="content flex-grow-1 p-4">
      <router-outlet />
    </div>

  </main>
</div>
