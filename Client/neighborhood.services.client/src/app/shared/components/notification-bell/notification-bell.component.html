<!-- 🔔 Notification Bell -->
<div ngbDropdown class="d-inline-block notification-bell" >
  <button
    type="button"
    class="btn btn-link position-relative p-0"
    ngbDropdownToggle
    aria-label="Show notifications" (click)="loadNotifications()">

    <i class="bi bi-bell fs-4"></i>

    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
      {{ unreadCount$ | async }}
    </span>
  </button>

  <div ngbDropdownMenu class="notification-menu">
    @for(not of notifications$ | async; track not.id){
      <div class="dropdown-item d-flex align-items-start" [ngClass]="{'bg-light': !not.isRead}" (click)="onNotificationClick(not)">
        <i class="bi bi-bell me-2"></i>
        <div>
          <p class="mb-1">{{ not.message }}</p>
          <small class="text-muted">{{ not.createdDate | date:'short' }}</small>
        </div>
      </div>
      
    }
     @if (this.unreadCount$.value==0){
    <div class="dropdown-item text-muted" >
      <i class="bi bi-bell-slash me-2"></i>
      No notifications
    </div>}
    <!-- <div class="dropdown-item text-muted" >
      <i class="bi bi-bell-slash me-2"></i>
      
     <p></p>
    </div> -->
   
  </div>
</div>
