<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
  <!-- Keep the bar layout LTR so the brand stays left and the auth controls stay right
       in both languages; only the nav links reorder for Arabic (see the ul below). -->
  <div class="container" dir="ltr">

    <!-- Brand -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <span class="logo-badge">NS</span>
      <span class="fw-bold">Neighborhood Services</span>
    </a>

    <!-- Mobile toggle (manual, no Bootstrap JS) -->
    <button class="navbar-toggler" type="button" (click)="toggleMenu()"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="menuOpen()">

      <!-- Public links -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-2" [attr.dir]="currentLang === 'ar' ? 'rtl' : 'ltr'">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">{{ "navbar.home" | translate }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/services" routerLinkActive="active">{{ "navbar.services" | translate }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">{{ "navbar.about" | translate }}</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active">{{ "navbar.contact" | translate }}</a>
        </li>
      </ul>

      <!-- Right side: search + language + auth -->
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <form class="d-flex" role="search">
          <input class="form-control form-control-sm me-2" type="search"
                 [placeholder]="'navbar.search' | translate" aria-label="Search" />
          <button class="btn btn-sm btn-outline-success" type="submit">
            <i class="bi bi-search"></i>
          </button>
        </form>
        <button class="btn btn-sm btn-outline-secondary" type="button"
                (click)="ChangeLang(currentLang === 'en' ? 'ar' : 'en')">
          {{ currentLang === 'en' ? 'AR' : 'EN' }}
        </button>
        @if (user()) {
          <a class="btn btn-sm btn-primary d-inline-flex align-items-center gap-1" [routerLink]="dashboardLink()">
            <i class="bi bi-speedometer2"></i> {{ "navbar.dashboard" | translate }}
          </a>
          <button class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1" type="button"
                  (click)="logout()" [disabled]="isLoggingOut()">
            @if (isLoggingOut()) {
              <span class="spinner-border spinner-border-sm" aria-hidden="true"></span>
            } @else {
              <i class="bi bi-box-arrow-right"></i>
            }
            {{ "navbar.logout" | translate }}
          </button>
        } @else {
          <a class="btn btn-sm btn-primary" routerLink="/auth/login">{{ "navbar.login" | translate }}</a>
        }
      </div>
    </div>
  </div>
</nav>
