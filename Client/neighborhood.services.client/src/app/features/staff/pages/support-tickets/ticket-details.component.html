<!-- أضيفيه تحت الـ td-body div -->
<div class="td-chat-section">
  
  <!-- Connection status -->
  <div class="td-chat-status" [ngClass]="connectionState">
    <span *ngIf="connectionState === 'connected'">🟢 Connected</span>
    <span *ngIf="connectionState === 'reconnecting'">🟡 Reconnecting…</span>
    <span *ngIf="connectionState === 'disconnected'">🔴 Disconnected</span>
  </div>

  <!-- Messages -->
  <div class="td-messages" #messagesContainer>
    <div *ngFor="let msg of messages" 
         class="td-message"
         [class.td-message--mine]="msg.senderId === senderId">
      <p class="td-message-text">{{ msg.message }}</p>
      <span class="td-message-time">
        {{ msg.createdAt | date:'HH:mm' }}
      </span>
    </div>
    <div *ngIf="messages.length === 0" class="td-no-messages">
      No messages yet. Start the conversation!
    </div>
  </div>

  <!-- Input -->
  <div class="td-chat-input">
    <input
      [(ngModel)]="newMessage"
      (keyup.enter)="sendMessage()"
      placeholder="Type a message…"
      [disabled]="connectionState !== 'connected'" />
    <button 
      (click)="sendMessage()"
      [disabled]="connectionState !== 'connected' || !newMessage.trim()">
      <i class="ti ti-send"></i>
    </button>
  </div>

</div>
