<section>
  <div class="container py-5">

    <div class="row">
      <!-- allConversations -->

      <div class="col-md-6 col-lg-5 col-xl-4 mb-4 mb-md-0" style="overflow-y: scroll;height:80vh">

        <div class="card">
          <div class="card-body">

            <ul class="list-unstyled mb-0">
              <li class="p-2 border-bottom bg-body-tertiary" *ngFor="let item of ConvSignals();">
                <div>
                  <p class="fw-bold "> <span style="color: brown;">Booking #{{item.bookingId}}</span>:
                    {{item.bookingDescription}}</p>
                </div>
                <a href="#!" class="d-flex justify-content-between">

                  <div class="d-flex flex-row">
                    <img [src]=item.coversationImage alt="avatar"
                      class="rounded-circle d-flex align-self-center me-3 shadow-1-strong" width="60">
                    <div class="pt-1">
                      <p class="fw-bold mb-0">{{item.othersName}}</p>
                      <p class="small text-muted">{{item.lastMessage}}</p>
                    </div>
                  </div>
                  <div class="pt-1">
                    <p class="small text-muted mb-1">3:03</p>
                    <span class="badge bg-danger float-end">1</span>
                  </div>
                </a>
              </li>
              
            </ul>

          </div>
        </div>

      </div>
      <!-- End Of allConversations -->

      <!-- CurrentConversation -->

      <div class="col-md-6 col-lg-7 col-xl-8" >

        <ul class="list-unstyled" style="overflow-y: scroll;height:50vh">
          <!-- <li class="d-flex justify-content-end mb-3">

            <div class="card bg-primary text-white shadow-sm" style="max-width: 70%;">
              <div class="card-body py-2 px-3">
                <p class="mb-1">
                  Lorem ipsum dolor sit amet.
                </p>

                <small class="text-light">
                  12:30 PM
                </small>
              </div>
            </div>

          </li> -->
          <!-- <li class="d-flex justify-content-end mb-3">

            <div class="card bg-primary text-white shadow-sm" style="max-width: 70%;">
              <div class="card-body py-2 px-3">
                <p class="mb-1">
                  Lorem ipsum dolor sit amet.
                </p>

                <small class="text-light">
                  12:30 PM
                </small>
              </div>
            </div>

          </li> -->
          <!-- <p>conversations</p> -->
          <div *ngFor="let mssg of AllMessagesForBooking(); ">

  @if (mssg.senderId==myId){
              <div class="d-flex flex-row justify-content-start " >
               
                <div>
                  <!-- ms-3 -->
                  <p class="small p-2 mb-1 rounded-3 bg-body-tertiary">{{mssg.content}}</p>

                 
                </div>
                
              </div>
              }
              @else{

               <div class="d-flex flex-row justify-content-end mb-4 pt-1">
                <div>
                  <!-- me-3 -->
                  <p class="small p-2  mb-1 text-white rounded-3 bg-info">{{mssg.content}}</p>
                
                  <p class="small me-3 mb-3 rounded-3 text-muted d-flex justify-content-end">00:06</p>
                </div>
                
              </div>}

  </div>
          
          

        </ul>
<div>
          <li class="bg-white mb-3">
            <div data-mdb-input-init class="form-outline">
              <textarea class="form-control bg-body-tertiary" id="textAreaExample2" rows="4"></textarea>
              <label class="form-label" for="textAreaExample2">Message</label>
            </div>
          </li>
          <button type="button" data-mdb-button-init data-mdb-ripple-init
            class="btn btn-info btn-rounded float-end">Send</button>
            </div>
      </div>

      <!-- End of CurrentConversation -->

    </div>

  </div>
</section>
