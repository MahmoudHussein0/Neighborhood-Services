
<div *ngIf="isLoading()">Loading...</div>



<div class="container py-4">

  <h2 class="mb-4 text-center">
    <i class="bi bi-heart-fill me-2"></i>
    المفضلة
  </h2>

  <div *ngIf="favs.length === 0" class="text-center text-muted mt-5">
    <h5>لا عناصر مفضلة حتى الآن</h5>
    <p>الفنيون الذين تتم إضافتهم إلى المفضلة يظهرون هنا.</p>
    <div>
      <button class="btn btn-success" >! تصفح الخدمات</button>
    </div>
  </div>

  <div class="row g-4">

    <div
      *ngFor="let item of favs"
      class="col-md-6 col-lg-4">

      <div class="card h-100 shadow-sm favorite-card">

        <img
          class="card-img-top"
          src="https://images.unsplash.com/photo-1740252117044-2af197eea287?q=80&w=580&auto=format&fit=crop"
          alt="Technician">

        <div class="card-body d-flex flex-column">

          <h5 class="card-title">
            {{ item.technician.fullName }}
          </h5>

          

          <div class="mt-auto">
            <button
              class="btn btn-success me-2">
              عرض الملف الشخصي
            </button>

            <button (click)="DeleteFromFavs(item.favoriteId)"
              class="btn btn-outline-danger">
              إزالة
            </button>
          </div>

        </div>
      </div>

    </div>

  </div>

</div>
