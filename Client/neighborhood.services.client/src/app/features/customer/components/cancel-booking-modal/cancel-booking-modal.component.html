<div class="modal-header">
  <h5 class="modal-title">{{ 'cancelDialog.title' | translate }}</h5>
  <button type="button" class="btn-close" (click)="dismiss()" aria-label="Close"></button>
</div>

<div class="modal-body">
  <label class="form-label">{{ 'cancelDialog.prompt' | translate }}</label>
  <textarea
    class="form-control"
    rows="3"
    [ngModel]="reason()"
    (ngModelChange)="reason.set($event)"
    [placeholder]="'cancelDialog.placeholder' | translate"></textarea>
</div>

<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="dismiss()">{{ 'common.back' | translate }}</button>
  <button type="button" class="btn btn-danger" [disabled]="!reason().trim()" (click)="submit()">
    {{ 'cancelDialog.submit' | translate }}
  </button>
</div>
