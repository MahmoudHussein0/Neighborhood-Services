<body style="margin:0; padding:40px 20px; background-color:#f4f6f9; font-family:Arial, Helvetica, sans-serif;">

    ```
    <div style="max-width:600px; margin:0 auto; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.1);">

        <!-- Header -->
        <div style="background:linear-gradient(135deg,#4f46e5,#06b6d4); padding:30px; text-align:center;">
            <h1 style="margin:0; color:white; font-size:28px;">
                Password Reset
            </h1>
        </div>

        <!-- Content -->
        <div style="padding:40px 30px; text-align:center; color:#333333;">

            <p style="font-size:16px; line-height:1.6; margin-bottom:30px;">
                We received a request to reset your password.
                Click the button below to continue.
            </p>

            <a href="{{ResettingUrl}}"
               style="display:inline-block;
                  padding:15px 35px;
                  background:linear-gradient(135deg,#4f46e5,#06b6d4);
                  color:#ffffff;
                  text-decoration:none;
                  font-size:16px;
                  font-weight:bold;
                  border-radius:50px;">
                Reset Password
            </a>

            <p style="margin-top:30px; color:#666666; font-size:14px; line-height:1.6;">
                If you did not request a password reset,
                you can safely ignore this email.
            </p>

        </div>

        <!-- Footer -->
        <div style="padding:20px; text-align:center; background:#fafafa; border-top:1px solid #eeeeee;">
            <p style="margin:0; color:#888888; font-size:12px;">
                © Neighborhood Services. All rights reserved.
            </p>
        </div>

    </div>
    ```

</body>
