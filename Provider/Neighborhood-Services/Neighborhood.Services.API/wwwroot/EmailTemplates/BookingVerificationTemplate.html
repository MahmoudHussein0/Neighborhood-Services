<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Your Booking Is verified!</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
            background-color: #ffffff;
            border: 1px solid #dddddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            text-align: center;
            border: 1px solid #dddddd;
        }

        td {
            padding: 10px;
            border: 1px solid #dddddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .total-row {
            font-weight: bold;
            background-color: #e8f5e9;
        }

        .status-confirmed {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="BookingVerification-container">

        <div class="content">
            <p>We Want to inform you that your booking is verified!</p>
            <table>
                <tr>
                    <th>BookingId:</th>
                    <td>{{BookingId}}</td>
                </tr>
                <tr>
                    <th>Technician Name:</th>
                    <td>{{TechnicianName}}</td>
                </tr>
                <tr>
                    <th>Schedualed At:</th>
                    <td>{{Time}}</td>
                </tr>
                <tr>
                    <th>Problem Type:</th>
                    <td>{{Problem}}</td>
                </tr>

            </table>
            
            <p>
                We hope you enjoy  our service! :) ♥
            </p>,
        </div>

    </div>
</body>
</html>
